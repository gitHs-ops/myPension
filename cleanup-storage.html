<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>LocalStorage Cleanup</title>
<style>
  body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
  h2 { color: #333; }
  .card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .book-item { padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; color: #555; }
  .book-item:last-child { border-bottom: none; }
  button { background: #e53935; color: #fff; border: none; padding: 12px 28px; border-radius: 6px; font-size: 15px; cursor: pointer; margin-top: 12px; }
  button:hover { background: #c62828; }
  .result { margin-top: 16px; padding: 12px; border-radius: 6px; font-size: 14px; }
  .success { background: #e8f5e9; color: #2e7d32; }
  .info { background: #e3f2fd; color: #1565c0; }
</style>
</head>
<body>
<h2>가계부 LocalStorage 정리</h2>

<div class="card">
  <b>현재 가계부 목록</b>
  <div id="bookList">로딩 중...</div>
</div>

<div class="card">
  <b>정리 내용:</b> 각 가계부의 데이터를 <u>첫 번째 1줄만 남기고</u> 나머지 삭제
  <br><br>
  <button onclick="cleanup()">정리 실행</button>
  <div id="result"></div>
</div>

<script>
function loadInfo() {
  const wsRaw = localStorage.getItem('hb_workspace');
  const listEl = document.getElementById('bookList');
  if (!wsRaw) {
    listEl.innerHTML = '<div class="book-item" style="color:#999">저장된 가계부 없음</div>';
    return;
  }
  const ws = JSON.parse(wsRaw);
  const books = ws.books || [];
  if (books.length === 0) {
    listEl.innerHTML = '<div class="book-item" style="color:#999">가계부 없음</div>';
    return;
  }
  listEl.innerHTML = books.map(b => {
    const data = JSON.parse(localStorage.getItem(`hb_data_${b.id}`) || '[]');
    return `<div class="book-item"><b>${b.title || b.id}</b> — 현재 ${data.length}행</div>`;
  }).join('');
}

function cleanup() {
  const wsRaw = localStorage.getItem('hb_workspace');
  const resultEl = document.getElementById('result');
  if (!wsRaw) {
    resultEl.className = 'result info';
    resultEl.textContent = '저장된 가계부 데이터가 없습니다.';
    return;
  }
  const ws = JSON.parse(wsRaw);
  const books = ws.books || [];
  let log = [];
  books.forEach(b => {
    const key = `hb_data_${b.id}`;
    const data = JSON.parse(localStorage.getItem(key) || '[]');
    const before = data.length;
    const kept = data.slice(0, 1);
    localStorage.setItem(key, JSON.stringify(kept));
    log.push(`[${b.title || b.id}] ${before}행 → 1행`);
  });
  resultEl.className = 'result success';
  resultEl.innerHTML = '완료!<br>' + log.join('<br>');
  loadInfo();
}

loadInfo();
</script>
</body>
</html>
