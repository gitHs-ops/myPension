<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예약 현황 — 영덕감성산장</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #6b3a1f;
  --primary-dark: #4a2510;
  --text: #222;
  --sub: #555;
  --muted: #888;
  --border: #ddd;
  --surface: #fff;
  --bg: #f7f7f7;
  --radius: 12px;
  --shadow: 0 2px 16px rgba(0,0,0,.1);
  --sans: 'Noto Sans KR', sans-serif;
  --confirmed: #6b3a1f;
  --pending: #d97706;
  --cancelled: #9ca3af;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--sans); color:var(--text); background:var(--bg); }

/* ── HEADER ── */
.header {
  position:sticky; top:0; z-index:200;
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:0 40px; height:64px;
  display:flex; align-items:center; justify-content:space-between;
}
.logo { display:flex; align-items:center; gap:10px; font-size:1.05rem; font-weight:900; color:#3d2010; text-decoration:none; }
.logo-icon { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#7a5c3a,#4a3018); display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
.header-nav { display:flex; align-items:center; gap:28px; }
.header-nav a { text-decoration:none; font-size:.9rem; font-weight:600; color:var(--text); transition:color .15s; }
.header-nav a:hover { color:var(--primary); }
.btn-reserve-header { padding:10px 22px; border-radius:999px; background:#3d2010; color:#fff; border:none; font-family:var(--sans); font-size:.88rem; font-weight:700; cursor:pointer; transition:background .15s; }
.btn-reserve-header:hover { background:#5c3319; }

/* ── HERO ── */
.hero { background:linear-gradient(135deg,#3d2210,#6b3a1f 55%,#8b5c3a); padding:44px 48px 36px; color:#fff; display:flex; align-items:center; justify-content:space-between; }
.hero-left { display:flex; flex-direction:column; }
.btn-back-main { display:inline-flex; align-items:center; gap:5px; color:rgba(255,255,255,.7); text-decoration:none; font-size:.82rem; font-weight:600; margin-bottom:12px; transition:color .15s; width:fit-content; }
.btn-back-main:hover { color:#fff; }
.hero h1 { font-size:1.8rem; font-weight:900; margin-bottom:6px; }
.hero p { font-size:.92rem; opacity:.75; }
.btn-add-rsv { background:#fff; color:var(--primary); border:none; padding:12px 26px; border-radius:999px; font-family:var(--sans); font-size:.9rem; font-weight:700; cursor:pointer; transition:transform .15s; display:block; white-space:nowrap; }
.btn-add-rsv:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,.2); }

/* ── STATS ── */
.stats-wrap { max-width:960px; margin:28px auto 0; padding:0 24px; display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
.stat-card { background:var(--surface); border-radius:var(--radius); padding:18px 20px; box-shadow:var(--shadow); }
.stat-label { font-size:.75rem; color:var(--muted); font-weight:600; margin-bottom:6px; }
.stat-val { font-size:1.6rem; font-weight:900; color:var(--primary); }
.stat-sub { font-size:.72rem; color:var(--muted); margin-top:3px; }
.stat-revenue { transition:filter .2s; }

/* ── MAIN LAYOUT ── */
.main-wrap { max-width:960px; margin:24px auto 80px; padding:0 24px; display:grid; grid-template-columns:1fr 340px; gap:28px; align-items:start; }

/* ── CALENDAR ── */
.cal-section { background:var(--surface); border-radius:var(--radius); padding:22px; box-shadow:var(--shadow); }
.cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
.cal-title { font-size:1rem; font-weight:900; }
.cal-nav { display:flex; gap:6px; }
.cal-nav button { background:none; border:1px solid var(--border); border-radius:50%; width:30px; height:30px; cursor:pointer; font-size:1rem; transition:background .12s; }
.cal-nav button:hover { background:var(--bg); }
.cal-wd-row { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:4px; }
.cal-wd { text-align:center; font-size:.72rem; color:var(--muted); font-weight:600; padding:4px 0; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); }
.cal-cell { height:48px; display:flex; align-items:center; justify-content:center; position:relative; cursor:pointer; }
.cal-cell:hover:not(.other-month) .cal-num { background:var(--bg); }
.cal-num { width:34px; height:34px; display:flex; align-items:center; justify-content:center; border-radius:50%; font-size:.85rem; position:relative; z-index:1; transition:background .1s; }
.cal-cell.other-month .cal-num { color:#ccc; cursor:default; }
.cal-cell.today .cal-num { font-weight:900; color:var(--primary); border:1.5px solid var(--primary); }
/* range band */
.cal-cell::before { content:''; position:absolute; top:50%; transform:translateY(-50%); height:34px; left:0; right:0; }
.cal-cell.rsv-mid::before { background:rgba(107,58,31,.12); }
.cal-cell.rsv-start::before { background:linear-gradient(to right, transparent 50%, rgba(107,58,31,.12) 50%); }
.cal-cell.rsv-end::before   { background:linear-gradient(to left,  transparent 50%, rgba(107,58,31,.12) 50%); }
.cal-cell.rsv-start .cal-num,
.cal-cell.rsv-end   .cal-num { background:var(--primary); color:#fff; }
.cal-cell.rsv-single .cal-num { background:var(--primary); color:#fff; }
/* pending */
.cal-cell.rsv-pend-mid::before    { background:rgba(217,119,6,.12); }
.cal-cell.rsv-pend-start::before  { background:linear-gradient(to right, transparent 50%, rgba(217,119,6,.12) 50%); }
.cal-cell.rsv-pend-end::before    { background:linear-gradient(to left,  transparent 50%, rgba(217,119,6,.12) 50%); }
.cal-cell.rsv-pend-start .cal-num,
.cal-cell.rsv-pend-end   .cal-num { background:var(--pending); color:#fff; }
.cal-cell.rsv-pend-single .cal-num { background:var(--pending); color:#fff; }
/* legend */
.cal-legend { display:flex; gap:16px; margin-top:14px; padding-top:14px; border-top:1px solid var(--bg); }
.legend-item { display:flex; align-items:center; gap:6px; font-size:.75rem; color:var(--muted); }
.legend-dot { width:10px; height:10px; border-radius:50%; }

/* ── LIST SECTION ── */
.list-section { display:flex; flex-direction:column; gap:14px; }
.list-header { display:flex; align-items:center; justify-content:space-between; }
.list-title { font-size:.95rem; font-weight:900; }
.filter-tabs { display:flex; gap:4px; }
.ftab { background:none; border:1px solid var(--border); border-radius:20px; padding:4px 12px; font-size:.75rem; font-family:var(--sans); cursor:pointer; color:var(--muted); transition:all .12s; }
.ftab.active { background:var(--primary); color:#fff; border-color:var(--primary); }

.rsv-card { background:var(--surface); border-radius:var(--radius); padding:16px 18px; box-shadow:var(--shadow); border-left:4px solid var(--border); }
.rsv-card.confirmed { border-left-color:var(--confirmed); }
.rsv-card.pending   { border-left-color:var(--pending); }
.rsv-card.cancelled { border-left-color:var(--cancelled); opacity:.7; }
.rsv-row1 { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.rsv-guest { display:flex; align-items:center; gap:8px; }
.rsv-avatar { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,var(--primary),#c8956c); display:flex; align-items:center; justify-content:center; font-size:.9rem; color:#fff; font-weight:700; flex-shrink:0; }
.rsv-name { font-weight:700; font-size:.9rem; }
.rsv-guests-count { font-size:.74rem; color:var(--muted); }
.status-badge { font-size:.7rem; font-weight:700; padding:3px 9px; border-radius:10px; }
.status-badge.confirmed { background:#fdf1e8; color:var(--confirmed); }
.status-badge.pending   { background:#fef3c7; color:var(--pending); }
.status-badge.cancelled { background:#f3f4f6; color:var(--cancelled); }
.rsv-dates { font-size:.82rem; color:var(--sub); margin-bottom:6px; }
.rsv-dates b { color:var(--text); }
.rsv-price { font-size:.8rem; color:var(--muted); }
.rsv-price b { color:var(--primary); font-size:.88rem; }
.rsv-memo { font-size:.76rem; color:var(--muted); margin-top:5px; font-style:italic; }
.rsv-actions { display:flex; gap:6px; margin-top:10px; }
.btn-rsv { font-size:.75rem; padding:5px 12px; border-radius:14px; border:1px solid var(--border); background:var(--surface); cursor:pointer; color:var(--text); transition:background .12s; }
.btn-rsv:hover { background:var(--bg); }
.btn-rsv.del { border-color:#e53935; color:#e53935; }
.btn-rsv.del:hover { background:#fff5f5; }
.empty-list { text-align:center; padding:48px 20px; color:var(--muted); }
.empty-list .ei { font-size:2.5rem; margin-bottom:10px; }

/* ── LIST INNER ── */
.list-section-inner { display:contents; }

/* ── MODAL ── */
.modal-bg { display:none; position:fixed; inset:0; z-index:500; background:rgba(0,0,0,.55); justify-content:center; align-items:center; }
.modal-bg.open { display:flex; }
.modal { background:#fff; border-radius:16px; padding:26px 28px; width:100%; max-width:480px; max-height:92vh; overflow-y:auto; box-shadow:0 12px 48px rgba(0,0,0,.22); }
.modal-title { font-size:1.05rem; font-weight:900; color:var(--primary); margin-bottom:20px; }
.form-row { margin-bottom:14px; }
.form-lbl { display:block; font-size:.78rem; color:var(--muted); margin-bottom:5px; font-weight:600; }
.form-input { width:100%; padding:10px 13px; border:1px solid var(--border); border-radius:9px; font-family:var(--sans); font-size:.9rem; background:#faf8f5; transition:border-color .15s; }
.form-input:focus { outline:none; border-color:var(--primary); }
textarea.form-input { resize:vertical; min-height:70px; }
.form-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
.status-select { appearance:none; cursor:pointer; }
.modal-btns { display:flex; gap:8px; margin-top:20px; }
.btn-ok { flex:1; background:var(--primary); color:#fff; border:none; padding:12px; border-radius:9px; font-family:var(--sans); font-weight:700; font-size:.9rem; cursor:pointer; }
.btn-ok:hover { background:var(--primary-dark); }
.btn-cl { background:#f0ebe4; color:var(--text); border:none; padding:12px 18px; border-radius:9px; font-family:var(--sans); font-size:.88rem; cursor:pointer; }
.nights-preview { font-size:.78rem; color:var(--primary); margin-top:4px; font-weight:600; min-height:16px; }
.form-err { color:#e53935; font-size:.78rem; margin-top:8px; display:none; }
.form-err.show { display:block; }

/* ── TOAST ── */
.sms-toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:9px 20px; border-radius:20px; font-size:.82rem; font-weight:600; z-index:900; opacity:0; transition:opacity .2s; pointer-events:none; white-space:nowrap; }
.sms-toast.show { opacity:1; }

/* ── LOADING OVERLAY ── */
.loading-overlay {
  display:none; position:fixed; inset:0; z-index:1000;
  background:rgba(255,255,255,.75); justify-content:center; align-items:center; flex-direction:column; gap:14px;
}
.loading-overlay.show { display:flex; }
.loading-spinner {
  width:42px; height:42px; border-radius:50%;
  border:4px solid var(--border); border-top-color:var(--primary);
  animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-msg { font-size:.9rem; color:var(--sub); font-weight:600; }


/* ── FOOTER ── */
footer { background:#1a1a18; padding:28px 48px; display:flex; align-items:center; justify-content:space-between; }
.footer-logo { display:flex; align-items:center; gap:8px; font-size:.9rem; font-weight:800; color:#fff; text-decoration:none; }
.footer-logo-icon { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,#7a5c3a,#4a3018); display:flex; align-items:center; justify-content:center; font-size:.85rem; }
.footer-nav { display:flex; gap:24px; }
.footer-nav a { text-decoration:none; font-size:.82rem; color:rgba(255,255,255,.5); font-weight:500; transition:color .15s; }
.footer-nav a:hover { color:#fff; }
.footer-copy { font-size:.78rem; color:rgba(255,255,255,.35); }

/* ── RESPONSIVE ── */
@media(max-width:860px) {
  .stats-wrap { grid-template-columns:1fr 1fr; }
  .main-wrap { grid-template-columns:1fr; }
  .hero { padding:32px 20px 26px; flex-direction:column; gap:14px; align-items:flex-start; }
  header.header { padding:0 16px; }
  footer { flex-direction:column; gap:14px; text-align:center; padding:24px 16px; }
  .footer-nav { flex-wrap:wrap; justify-content:center; gap:12px; }
}
@media(max-width:480px) {
  .stats-wrap { grid-template-columns:1fr 1fr; gap:10px; }
  .form-row-2 { grid-template-columns:1fr; }
}
</style>
</head>

<div class="stats-wrap">

<!-- ── MAIN ── -->

<!-- ══════════ MODALS ══════════ -->

<!-- 예약 추가/수정 -->
<div class="modal-bg" id="rsvModal">
  <div class="modal">
    <div class="modal-title" id="rsvModalTitle">＋ 예약 하기</div>
    <div class="form-row-2">
      <div>
        <label class="form-lbl">투숙객 이름 *</label>
        <input class="form-input" id="inGuestName" type="text" placeholder="홍길동" maxlength="20">
      </div>
      <div>
        <label class="form-lbl">연락처</label>
        <input class="form-input" id="inPhone" type="tel" placeholder="010-0000-0000">
      </div>
    </div>
    <div class="form-row">
      <label class="form-lbl">이메일</label>
      <input class="form-input" id="inEmail" type="email" placeholder="example@email.com">
    </div>
    <div class="form-row-2">
      <div>
        <label class="form-lbl">체크인 *</label>
        <input class="form-input" id="inCheckin" type="date" oninput="previewNights()" onkeydown="return false" style="cursor:pointer">
      </div>
      <div>
        <label class="form-lbl">체크아웃 *</label>
        <input class="form-input" id="inCheckout" type="date" oninput="previewNights()" onkeydown="return false" style="cursor:pointer">
      </div>

        <label class="form-lbl">총 요금 (원)</label>
        <input class="form-input" id="inPrice" type="number" min="0" step="1000" placeholder="자동 계산">

      <label class="form-lbl">상태</label>

      <label class="form-lbl">메모</label>
      <textarea class="form-input" id="inMemo" placeholder="늦은 체크인, 특이사항 등"></textarea>
    </div>
    <div class="form-err" id="rsvErr"></div>
    <div class="modal-btns">
      <button class="btn-cl" onclick="closeRsvModal()">취소</button>
      <button class="btn-ok" onclick="saveRsv()">저장</button>

</div>

<!-- 로딩 오버레이 -->

  <div class="loading-spinner"></div>
  <div class="loading-msg" id="loadingMsg">처리 중...</div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbypuUXyamGgNWKxG7NEal6iT7Y6WjJRT9kbXCCoCuWKq1NZ-X1lf0lv_oM5PrIxJQrX/exec';

// ── STATE ──
let RESERVATIONS = [];
let FILTER = 'all';
let EDIT_ID = null;
let CAL_MONTH = new Date();

// ── INIT ──
async function init() {
  CAL_MONTH = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
  await loadFromGAS();
  renderStats();
  renderCalendar();
  renderList();
}

// ── 로딩 표시 ──
function showLoading(msg) {
  document.getElementById('loadingMsg').textContent = msg || '처리 중...';
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}

// ── GAS 연동 헬퍼 ──
async function loadFromGAS() {
  showLoading('예약 현황을 불러오는 중...');
  try {
    const res  = await fetch(`${GAS_URL}?action=rsv_load`, { redirect: 'follow' });
    const data = await res.json();
    if (data.success) {
      RESERVATIONS = data.reservations || [];
      try { localStorage.setItem('pension_reservations', JSON.stringify(RESERVATIONS)); } catch(e) {}
    } else throw new Error(data.message);
  } catch(e) {
    // GAS 실패 시 로컬 캐시 사용
    try { RESERVATIONS = JSON.parse(localStorage.getItem('pension_reservations') || '[]'); } catch(e2) { RESERVATIONS = []; }
    showToast('⚠️ 서버 연결 실패 — 로컬 캐시로 표시합니다');
    console.warn('GAS 로드 실패 — 로컬 캐시 사용:', e.message);
  } finally {
    hideLoading();
  }
}

async function upsertToGAS(rsv) {
  showLoading('예약을 저장하는 중...');
  try {
    const qs = new URLSearchParams({
      action:     'rsv_upsert',
      id:         rsv.id         || '',
      guestName:  rsv.guestName  || '',
      phone:      rsv.phone      || '',
      email:      rsv.email      || '',
      checkin:    rsv.checkin    || '',
      checkout:   rsv.checkout   || '',
      nights:     rsv.nights     || 0,
      guests:     rsv.guests     || 1,
      totalPrice: rsv.totalPrice || 0,
      status:     rsv.status     || '',
      memo:       rsv.memo       || '',
      createdAt:  rsv.createdAt  || ''
    });
    const res  = await fetch(`${GAS_URL}?${qs}`, { redirect: 'follow' });
    const data = await res.json();
    if (!data.success) showToast('⚠️ 시트 저장 실패: ' + data.message);
  } catch(e) {
    showToast('⚠️ 시트 저장 실패: ' + e.message);
  } finally {
    hideLoading();
  }
}

async function deleteFromGAS(id) {
  showLoading('예약을 삭제하는 중...');
  try {
    const qs = new URLSearchParams({ action: 'rsv_delete', id });
    await fetch(`${GAS_URL}?${qs}`, { redirect: 'follow' });
  } catch(e) { showToast('⚠️ 시트 삭제 실패: ' + e.message); }
  finally { hideLoading(); }
}

async function updateStatusGAS(id, status) {
  showLoading('상태를 변경하는 중...');
  try {
    const qs = new URLSearchParams({ action: 'rsv_status', id, status });
    await fetch(`${GAS_URL}?${qs}`, { redirect: 'follow' });
  } catch(e) { showToast('⚠️ 상태 변경 실패: ' + e.message); }
  finally { hideLoading(); }
}

// ── PERSIST (로컬 캐시) ──
function saveRsvData() {
  try { localStorage.setItem('pension_reservations', JSON.stringify(RESERVATIONS)); } catch(e) {}
}

// ── DATES ──
function parseDate(s) { return s ? new Date(s + 'T00:00:00') : null; }
function dateStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtDate(s) {
  if (!s) return '';
  const d = parseDate(s);
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}
function fmtShort(s) {
  if (!s) return '';
  const d = parseDate(s);
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function nightsBetween(cin, cout) {
  if (!cin || !cout) return 0;
  return Math.max(0, Math.round((parseDate(cout) - parseDate(cin)) / (1000*60*60*24)));
}
function todayStr() { return dateStr(new Date()); }

// ── STATS ──
function renderStats() {
  const confirmed = RESERVATIONS.filter(r => r.status === 'confirmed');
  const now = new Date();
  const thisMonth = confirmed.filter(r => {
    const d = parseDate(r.checkin);
    return d && d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
  });
  const totalNights = confirmed.reduce((s,r) => s + (r.nights||0), 0);
  const revenue = confirmed.reduce((s,r) => s + (r.totalPrice||0), 0);
  document.getElementById('statTotal').textContent  = confirmed.length;
  document.getElementById('statMonth').textContent  = thisMonth.length;
  document.getElementById('statMonthLabel').textContent = `${now.getMonth()+1}월 기준`;
  document.getElementById('statNights').textContent = totalNights;
  document.getElementById('statRevenue').textContent = `₩${revenue.toLocaleString()}`;
}

// ── CALENDAR ──
function navMonth(dir) {
  CAL_MONTH = new Date(CAL_MONTH.getFullYear(), CAL_MONTH.getMonth() + dir, 1);
  renderCalendar();
}

function renderCalendar() {
  const y = CAL_MONTH.getFullYear(), m = CAL_MONTH.getMonth();
  document.getElementById('calTitle').textContent = `${y}년 ${m+1}월`;
  const startDow = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const todayS = todayStr();

  // 필터에 맞는 예약만 캘린더에 표시
  let rsvForCal;
  if      (FILTER === 'confirmed') rsvForCal = RESERVATIONS.filter(r => r.status === 'confirmed');
  else if (FILTER === 'pending')   rsvForCal = RESERVATIONS.filter(r => r.status === 'pending');
  else if (FILTER === 'cancelled') rsvForCal = [];
  else                             rsvForCal = RESERVATIONS.filter(r => r.status !== 'cancelled');

  // Build a map of date → reservation info (체크아웃일은 제외 — 다음 예약 체크인 가능)
  const dateMap = {};
  rsvForCal.forEach(r => {
    if (!r.checkin || !r.checkout) return;
    const cin  = parseDate(r.checkin);
    const cout = parseDate(r.checkout);
    const lastNight = new Date(cout); lastNight.setDate(lastNight.getDate() - 1);
    const lastNightStr = dateStr(lastNight);
    const cur  = new Date(cin);
    while (cur < cout) {
      const ds = dateStr(cur);
      if (!dateMap[ds] || r.status === 'confirmed')
        dateMap[ds] = { id:r.id, status:r.status, isStart: ds===r.checkin, isEnd: ds===lastNightStr };
      cur.setDate(cur.getDate()+1);
    }
  });

  let html = '';
  for (let i=0; i<startDow; i++) html += `<div class="cal-cell other-month"><div class="cal-num"></div></div>`;

  for (let d=1; d<=daysInMonth; d++) {
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const info = dateMap[ds];
    const isToday = ds === todayS;
    let cls = 'cal-cell';
    if (isToday) cls += ' today';
    if (info) {
      const p = info.status === 'pending' ? 'rsv-pend' : 'rsv';
      if (info.isStart && info.isEnd)   cls += ` ${p}-single`;
      else if (info.isStart)            cls += ` ${p}-start`;
      else if (info.isEnd)              cls += ` ${p}-end`;
      else                              cls += ` ${p}-mid`;
    }
    const clickAttr = info ? `onclick="scrollToRsv('${info.id}')"` : '';
    html += `<div class="${cls}" ${clickAttr}><div class="cal-num">${d}</div></div>`;
  }

  document.getElementById('calGrid').innerHTML = html;
}

function scrollToRsv(id) {
  const el = document.getElementById('rc_' + id);
  if (el) { el.scrollIntoView({behavior:'smooth', block:'center'}); el.style.outline='2px solid var(--primary)'; setTimeout(()=>el.style.outline='',1500); }
}

// ── LIST ──
function setFilter(f) {
  FILTER = f;
  document.querySelectorAll('.ftab').forEach(el => el.classList.toggle('active', el.dataset.filter === f));
  renderList();
  renderCalendar();
}

function renderList() {
  const el = document.getElementById('rsvList');
  let list = [...RESERVATIONS].sort((a,b) => (a.checkin||'').localeCompare(b.checkin||''));
  if (FILTER !== 'all') list = list.filter(r => r.status === FILTER);
  if (!list.length) {
    el.innerHTML = `<div class="empty-list"><div class="ei">📋</div>${FILTER==='all'?'등록된 예약이 없습니다.':'해당 상태의 예약이 없습니다.'}</div>`;
    return;
  }
  el.innerHTML = list.map(r => {
    const initial = (r.guestName||'?')[0];
    const nights = r.nights || nightsBetween(r.checkin, r.checkout);
    const statusLabel = {confirmed:'확정', pending:'대기중', cancelled:'취소'}[r.status] || r.status;
    return `
    <div class="rsv-card ${r.status}" id="rc_${r.id}">
      <div class="rsv-row1">
        <div class="rsv-guest">
          <div class="rsv-avatar">${initial}</div>
          <div>
            <div class="rsv-name">${esc(r.guestName)}</div>
            <div class="rsv-guests-count">${r.guests||1}명</div>
          </div>
        </div>
        <span class="status-badge ${r.status}">${statusLabel}</span>
      </div>
      <div class="rsv-dates">
        <b>${fmtShort(r.checkin)}</b> 체크인 → <b>${fmtShort(r.checkout)}</b> 체크아웃 &nbsp;·&nbsp; ${nights}박
      </div>
      ${r.totalPrice ? `<div class="rsv-price">총 요금: <b>₩${r.totalPrice.toLocaleString()}</b></div>` : ''}
      ${r.phone ? `<div class="rsv-price" style="margin-top:2px">연락처: ${esc(r.phone)}</div>` : ''}
      ${r.email ? `<div class="rsv-price" style="margin-top:2px">이메일: ${esc(r.email)}</div>` : ''}
      ${r.memo ? `<div class="rsv-memo">"${esc(r.memo)}"</div>` : ''}
      <div class="rsv-actions">
        <select class="btn-rsv" style="font-family:var(--sans);font-size:.75rem" onchange="changeStatus('${r.id}',this.value)">
          <option value="confirmed" ${r.status==='confirmed'?'selected':''}>확정</option>
          <option value="pending"   ${r.status==='pending'  ?'selected':''}>대기중</option>
          <option value="cancelled" ${r.status==='cancelled'?'selected':''}>취소</option>
        </select>
        <button class="btn-rsv" onclick="openRsvModal('${r.id}')">✏️ 수정</button>
        <button class="btn-rsv del" onclick="deleteRsv('${r.id}')">🗑 삭제</button>
      </div>
    </div>`;
  }).join('');
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── STATUS CHANGE ──
async function changeStatus(id, status) {
  const r = RESERVATIONS.find(r => r.id === id);
  if (!r) return;
  const prev = r.status;
  r.status = status;
  saveRsvData();
  renderStats();
  renderCalendar();
  renderList();
  await updateStatusGAS(id, status);
}

function showToast(msg) {
  const el = document.getElementById('smsToast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ── DELETE ──
async function deleteRsv(id) {
  if (!confirm('이 예약을 삭제하시겠어요?')) return;
  RESERVATIONS = RESERVATIONS.filter(r => r.id !== id);
  saveRsvData();
  renderStats();
  renderCalendar();
  renderList();
  await deleteFromGAS(id);
}

// ── MODAL ──
function openRsvModal(id) {
  EDIT_ID = id || null;
  const r = id ? RESERVATIONS.find(r => r.id === id) : null;
  document.getElementById('rsvModalTitle').textContent = r ? '✏️ 예약 수정' : '＋ 예약 하기';
  document.getElementById('inGuestName').value = r?.guestName || '';
  document.getElementById('inPhone').value     = r?.phone || '';
  document.getElementById('inEmail').value     = r?.email || '';
  document.getElementById('inCheckin').value   = r?.checkin || '';
  document.getElementById('inCheckout').value  = r?.checkout || '';
  document.getElementById('inGuests').value    = r?.guests || 2;
  document.getElementById('inPrice').value     = r?.totalPrice || '';
  document.getElementById('inStatus').value    = r?.status || 'confirmed';
  document.getElementById('inMemo').value      = r?.memo || '';
  document.getElementById('rsvErr').classList.remove('show');
  previewNights();
  document.getElementById('rsvModal').classList.add('open');
}

function closeRsvModal() { document.getElementById('rsvModal').classList.remove('open'); }

function previewNights() {
  const cin  = document.getElementById('inCheckin').value;
  const cout = document.getElementById('inCheckout').value;
  const n = nightsBetween(cin, cout);
  const el = document.getElementById('nightsPreview');
  if (cin && cout && n > 0) {
    if (!document.getElementById('inPrice').value) {
      const prices = JSON.parse(localStorage.getItem('pension_prices') || '{}');
      const nr = prices.nightRate || 120000;
      const cf = prices.cleanFee !== undefined ? prices.cleanFee : 30000;
      const sr = prices.svcRate !== undefined ? prices.svcRate : 0.12;
      const sub = nr * n;
      const total = sub + cf + Math.round(sub * sr);
      document.getElementById('inPrice').value = total;
    }
    el.textContent = `${n}박 (${fmtDate(cin)} ~ ${fmtDate(cout)})`;
  } else {
    el.textContent = cin && cout && n <= 0 ? '체크아웃은 체크인 이후 날짜로 선택해주세요.' : '';
  }
}

function saveRsv() {
  const errEl = document.getElementById('rsvErr');
  errEl.classList.remove('show');
  const name   = document.getElementById('inGuestName').value.trim();
  const cin    = document.getElementById('inCheckin').value;
  const cout   = document.getElementById('inCheckout').value;
  const guests = parseInt(document.getElementById('inGuests').value) || 1;
  const price  = parseInt(document.getElementById('inPrice').value) || 0;
  const status = document.getElementById('inStatus').value;
  const memo   = document.getElementById('inMemo').value.trim();
  const phone  = document.getElementById('inPhone').value.trim();
  const email  = document.getElementById('inEmail').value.trim();

  if (!name) { showErr(errEl, '투숙객 이름을 입력해주세요.'); return; }
  if (!cin)  { showErr(errEl, '체크인 날짜를 선택해주세요.'); return; }
  if (!cout) { showErr(errEl, '체크아웃 날짜를 선택해주세요.'); return; }
  if (nightsBetween(cin, cout) <= 0) { showErr(errEl, '체크아웃은 체크인 이후여야 합니다.'); return; }

  // ── 예약 중복 체크 ──
  const conflict = RESERVATIONS.find(r =>
    r.id !== EDIT_ID &&          // 현재 수정 중인 예약 제외
    r.status !== 'cancelled' &&  // 취소된 예약 제외
    cin  < r.checkout &&         // 새 체크인이 기존 체크아웃 이전
    cout > r.checkin             // 새 체크아웃이 기존 체크인 이후
  );
  if (conflict) {
    showErr(errEl,
      `⚠️ 예약 불가 — ${fmtDate(conflict.checkin)} ~ ${fmtDate(conflict.checkout)} 기간에 ` +
      `"${conflict.guestName}"님의 예약이 있습니다.`
    );
    return;
  }

  const nights = nightsBetween(cin, cout);

  let rsv;
  if (EDIT_ID) {
    rsv = RESERVATIONS.find(r => r.id === EDIT_ID);
    if (rsv) Object.assign(rsv, {guestName:name, phone, email, checkin:cin, checkout:cout, nights, guests, totalPrice:price, status, memo});
  } else {
    rsv = { id:'rsv_'+Date.now(), guestName:name, phone, email, checkin:cin, checkout:cout, nights, guests, totalPrice:price, status, memo, createdAt:todayStr() };
    RESERVATIONS.push(rsv);
  }

  saveRsvData();
  closeRsvModal();
  renderStats();
  renderCalendar();
  renderList();
  if (rsv) upsertToGAS(rsv);
}

function showErr(el, msg) { el.textContent = msg; el.classList.add('show'); }

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('rsvModal').classList.remove('open');
  }
});
document.getElementById('rsvModal').addEventListener('click', e => {
  if (e.target === document.getElementById('rsvModal')) closeRsvModal();
});

init();
</script>
