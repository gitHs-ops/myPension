<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>앱 목록 게시판</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(180deg, #167684 0%, #7ed6d3 100%);
      color: #222;
      font-family: 'Noto Sans KR', sans-serif;
      margin: 0;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    .container { max-width: 900px; margin: 40px auto; background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(51,88,244,.10); padding: 40px 32px; position:relative; z-index:1; }
    .nav { background: #fff; border-bottom: 1.5px solid #e2e8f4; height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; box-shadow: 0 2px 8px rgba(51,88,244,.04); }
    .nav-logo { font-weight: 800; font-size: 1.1rem; color: #3358f4; letter-spacing: -0.02em; }
    .nav-menu { display: flex; gap: 24px; }
    .nav-menu a { color: #4a567a; text-decoration: none; font-size: .95rem; font-weight: 500; transition: color .15s; }
    .nav-menu a:hover { color: #3358f4; }
    h1 { font-size: 1.6rem; color: #3358f4; margin-bottom: 8px; }
    .subtitle { color: #8893b0; font-size: 1.05rem; margin-bottom: 28px; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    thead { background: #f4f6fb; }
    th, td { padding: 14px 10px; text-align: left; }
    th { color: #4a567a; font-size: .98rem; border-bottom: 2px solid #e2e8f4; }
    tr { border-bottom: 1px solid #e2e8f4; }
    td { font-size: .97rem; color: #222; }
    .app-title { font-weight: 700; color: #3358f4; }
    .desc { color: #4a567a; font-size: .96rem; }
    .date { color: #8893b0; font-size: .93rem; }
    .btn { background: #3358f4; color: #fff; border: none; border-radius: 8px; padding: 7px 18px; font-size: .95rem; font-weight: 600; cursor: pointer; transition: background .15s; }
    .btn:hover { background: #223a99; }
    .btn-icon { border: none; border-radius: 8px; width: 36px; height: 36px; font-size: 1.1rem; cursor: pointer; transition: background .15s, transform .1s; display: inline-flex; align-items: center; justify-content: center; }
    .btn-icon:hover { transform: scale(1.12); }
    .btn-edit { background: #e8effe; color: #3358f4; }
    .btn-edit:hover { background: #c7d3fc; }
    .btn-del { background: #fee2e2; color: #ef4444; }
    .btn-del:hover { background: #fca5a5; }
    .btn-go { background: #e6faf7; color: #0ec7a5; }
    .btn-go:hover { background: #b2f0e8; }
    .status-bar { font-size: .85rem; color: #8893b0; margin-bottom: 10px; min-height: 20px; }
    .status-bar.err { color: #ef4444; }
    @media (max-width: 960px) {
      .container { max-width: 98vw; padding: 18px 4vw; }
      .nav { padding: 0 12px; }
      th, td { padding: 10px 4px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-logo">AppList <span style="color:#0ec7a5;">Board</span></div>
    <div class="nav-menu">
      <a href="#">홈</a>
      <a href="#">소개</a>
      <a href="#">문의</a>
    </div>
  </nav>
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
      <h1 style="margin-bottom:0;display:flex;align-items:center;gap:16px;">
        앱 목록 게시판
        <span id="verInfo" style="font-size:.98rem;font-weight:500;color:#8893b0;"></span>
      </h1>
      <a href="app-add.html" class="btn" style="padding:9px 20px;font-size:.98rem;">+ 앱 추가</a>
    </div>
    <div class="subtitle">최신 앱과 도구를 한눈에 확인하고 바로 이동하세요.</div>
    <div id="statusBar" class="status-bar">⏳ 목록 불러오는 중...</div>
    <table>
      <thead>
        <tr>
          <th>앱 이름</th>
          <th>설명</th>
          <th>등록일</th>
          <th>바로가기</th>
          <th>관리</th>
        </tr>
      </thead>
      <tbody id="appTbody"></tbody>
    </table>
  </div>
  <script>
    // ── 설정 ──
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzZDRXoaAZb6ukSoUWNI3d20dD3ROPOhkYRdga3F0kmX3RQUoskIprVtSS046cdNefq-Q/exec';
    const SHEET_ID = '1tIHCgQNqSQgWmjilcP74z7SWvfO0JbD-V8dC0fJ5CV0';

    // ── 버전 표시 (페이지 로드 시 고정, 앱 저장 시에만 증가) ──
    const VER_KEY = 'appListVer';
    (function(){
      const today = new Date();
      const dateStr = today.getFullYear() + '-' +
        ('0'+(today.getMonth()+1)).slice(-2) + '-' +
        ('0'+today.getDate()).slice(-2);
      let verObj = { v: 1.0, date: dateStr };
      try { verObj = JSON.parse(localStorage.getItem(VER_KEY)) || verObj; } catch(e) {}
      if (verObj.date !== dateStr) {
        verObj = { v: 1.0, date: dateStr };
        localStorage.setItem(VER_KEY, JSON.stringify(verObj));
      }
      document.addEventListener('DOMContentLoaded', function(){
        const el = document.getElementById('verInfo');
        if(el) el.textContent = 'Ver ' + verObj.v.toFixed(1) + ' (' + verObj.date + ')';
      });
    })();
    function bumpVersion() {
      let verObj = { v: 1.0, date: '' };
      try { verObj = JSON.parse(localStorage.getItem(VER_KEY)) || verObj; } catch(e) {}
      verObj.v = Math.round((verObj.v + 0.1) * 10) / 10;
      localStorage.setItem(VER_KEY, JSON.stringify(verObj));
    }

    // ── 상태 메시지 ──
    function setStatus(msg, isErr) {
      const el = document.getElementById('statusBar');
      el.textContent = msg;
      el.className = 'status-bar' + (isErr ? ' err' : '');
    }

    // ── GAS에서 목록 로드 ──
    async function loadApps() {
      try {
        const res = await fetch(`${APPS_SCRIPT_URL}?action=list`);
        const json = await res.json();
        if (!json.ok) throw new Error('GAS 응답 오류');
        // GAS 데이터를 localStorage에도 캐시
        localStorage.setItem('apps', JSON.stringify(json.data));
        renderApps(json.data);
        setStatus(`✅ ${json.data.length}개 앱 로드 완료`);
      } catch(e) {
        // GAS 실패 시 localStorage 캐시로 폴백
        const cached = getCachedApps();
        if (cached.length) {
          renderApps(cached);
          setStatus('⚠️ 오프라인 캐시로 표시 중 (GAS 연결 실패)', true);
        } else {
          setStatus('❌ 데이터 로드 실패: ' + e.message, true);
        }
      }
    }

    function getCachedApps() {
      try { return JSON.parse(localStorage.getItem('apps') || '[]'); } catch(e) { return []; }
    }

    // ── GAS에 전체 목록 저장 ──
    async function saveApps(apps) {
      const data = encodeURIComponent(JSON.stringify(apps));
      const res = await fetch(`${APPS_SCRIPT_URL}?action=save&data=${data}`);
      const json = await res.json();
      if (!json.ok) throw new Error('저장 실패');
      localStorage.setItem('apps', JSON.stringify(apps));
    }

    // ── 렌더링 ──
    function renderApps(apps) {
      const tbody = document.getElementById('appTbody');
      tbody.innerHTML = '';
      if (!apps.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#8893b0;padding:32px;">등록된 앱이 없습니다.</td></tr>';
        return;
      }
      apps.forEach((app, idx) => {
        tbody.innerHTML += `<tr>
          <td class="app-title">${app.name}</td>
          <td class="desc">${app.desc}</td>
          <td class="date">${app.date}</td>
          <td><a href="${app.url}" class="btn-icon btn-go" title="이동" style="text-decoration:none;">🚀</a></td>
          <td style="display:flex;gap:6px;align-items:center;">
            <button class="btn-icon btn-edit" title="수정" onclick="location.href='app-add.html?edit=${idx}'">✏️</button>
            <button class="btn-icon btn-del" title="삭제" onclick="deleteApp(${idx})">🗑️</button>
          </td>
        </tr>`;
      });
    }

    // ── 삭제 ──
    async function deleteApp(idx) {
      if (!confirm('이 앱을 삭제할까요?')) return;
      let apps = getCachedApps();
      apps.splice(idx, 1);
      setStatus('⏳ 삭제 중...');
      try {
        await saveApps(apps);
        renderApps(apps);
        setStatus(`✅ 삭제 완료`);
      } catch(e) {
        setStatus('❌ 삭제 실패: ' + e.message, true);
      }
    }

    // ── 초기 로드 ──
    loadApps();
  </script>
</body>
</html>
