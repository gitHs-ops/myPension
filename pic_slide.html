<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사진 슬라이드 - 영덕감성산장</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #6b3a1f;
  --sans: 'Noto Sans KR', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--sans); background:#0a0a0a; color:#fff; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

/* ── TOP BAR ── */
.top-bar {
  position:relative; z-index:10;
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 24px;
  background:linear-gradient(to bottom, rgba(0,0,0,.75), transparent);
}
.btn-back {
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2);
  color:#fff; border-radius:999px; padding:8px 18px;
  font-family:var(--sans); font-size:.85rem; font-weight:700; cursor:pointer;
  text-decoration:none; transition:background .15s;
}
.btn-back:hover { background:rgba(255,255,255,.22); }
.slide-counter {
  font-size:.9rem; font-weight:700; color:rgba(255,255,255,.8);
  background:rgba(0,0,0,.35); border-radius:999px; padding:6px 16px;
}
.filter-tabs {
  display:flex; gap:6px;
}
.filter-tab {
  padding:7px 14px; border-radius:999px; border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.08); color:rgba(255,255,255,.65);
  font-family:var(--sans); font-size:.78rem; font-weight:600; cursor:pointer;
  transition:all .15s; white-space:nowrap;
}
.filter-tab.active { background:rgba(255,255,255,.9); color:#1a1a1a; border-color:transparent; }

/* ── MAIN PHOTO ── */
.slide-main {
  flex:1; position:relative; display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}
.slide-img {
  max-width:100%; max-height:100%;
  object-fit:contain;
  transition:opacity .25s ease;
  user-select:none;
}
.slide-placeholder {
  display:flex; align-items:center; justify-content:center;
  width:100%; height:100%;
  font-size:6rem; opacity:.3;
}

/* ── NAV BUTTONS ── */
.nav-btn {
  position:absolute; top:50%; transform:translateY(-50%);
  width:52px; height:52px; border-radius:50%;
  background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2);
  color:#fff; font-size:1.5rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background .15s; z-index:5;
}
.nav-btn:hover { background:rgba(255,255,255,.28); }
.nav-prev { left:20px; }
.nav-next { right:20px; }

/* ── INFO BAR ── */
.info-bar {
  background:linear-gradient(to top, rgba(0,0,0,.85), transparent);
  padding:20px 24px 12px;
  position:relative; z-index:10;
}
.info-category {
  font-size:.7rem; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  color:rgba(255,255,255,.5); margin-bottom:4px;
}
.info-title { font-size:1.05rem; font-weight:800; margin-bottom:4px; }
.info-desc { font-size:.82rem; color:rgba(255,255,255,.6); line-height:1.6; }

/* ── THUMBNAIL STRIP ── */
.thumb-strip {
  display:flex; gap:8px; padding:12px 24px 20px;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
  background:rgba(0,0,0,.6);
}
.thumb-strip::-webkit-scrollbar { height:3px; }
.thumb-strip::-webkit-scrollbar-thumb { background:rgba(255,255,255,.25); border-radius:2px; }
.thumb {
  flex-shrink:0; width:64px; height:48px; border-radius:6px;
  overflow:hidden; cursor:pointer; border:2px solid transparent;
  transition:border-color .15s, opacity .15s; opacity:.55;
  display:flex; align-items:center; justify-content:center;
  font-size:1.4rem;
}
.thumb.active { border-color:#fff; opacity:1; }
.thumb:hover { opacity:.85; }
.thumb img { width:100%; height:100%; object-fit:cover; }
.thumb-bg { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:1.4rem; }

/* ── MOBILE ── */
@media(max-width:600px) {
  .filter-tabs { display:none; }
  .info-title { font-size:.95rem; }
  .nav-btn { width:40px; height:40px; font-size:1.2rem; }
  .nav-prev { left:8px; }
  .nav-next { right:8px; }
  .thumb { width:52px; height:38px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <a class="btn-back" href="pic_view.html">‹ 카드 보기</a>
  <div class="slide-counter" id="slideCounter">1 / 12</div>
  <button onclick="hostCheckThenUpload()" style="display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:7px 16px;font-family:inherit;font-size:.82rem;font-weight:700;color:#fff;cursor:pointer;white-space:nowrap;transition:background .15s;" onmouseover="this.style.background='rgba(255,255,255,.22)'" onmouseout="this.style.background='rgba(255,255,255,.12)'">📷 이미지 업로드</button>
  <div class="filter-tabs" id="filterTabs">
    <button class="filter-tab active" onclick="setFilter('all',this)">전체</button>
    <button class="filter-tab" onclick="setFilter('exterior',this)">외관</button>
    <button class="filter-tab" onclick="setFilter('interior',this)">실내</button>
    <button class="filter-tab" onclick="setFilter('view',this)">전망</button>
    <button class="filter-tab" onclick="setFilter('facility',this)">편의시설</button>
  </div>
</div>

<!-- MAIN PHOTO -->
<div class="slide-main" id="slideMain">
  <button class="nav-btn nav-prev" onclick="move(-1)">‹</button>
  <div id="slideContent" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;"></div>
  <button class="nav-btn nav-next" onclick="move(1)">›</button>
</div>

<!-- INFO BAR -->
<div class="info-bar">
  <div class="info-category" id="infoCategory"></div>
  <div class="info-title" id="infoTitle"></div>
  <div class="info-desc" id="infoDesc"></div>
</div>

<!-- THUMBNAIL STRIP -->
<div class="thumb-strip" id="thumbStrip"></div>

<script>
const PV_KEY = 'pv_cards';
const DEFAULT_CARDS = [
  { id:1,  cat:'exterior', featured:true,  bg:'linear-gradient(135deg,#7a9e50,#527830)', icon:'🌿', imgData:null, category:'외관 · 전경', title:'산 중턱의 감성 별채 외관',     desc:'울창한 나무숲 사이에 자리한 영덕감성산장의 전경입니다. 사계절 다른 풍경을 선사합니다.' },
  { id:2,  cat:'view',     featured:false, bg:'linear-gradient(135deg,#4a8ec4,#2a6090)', icon:'🌊', imgData:null, category:'전망 · 자연', title:'테라스에서 바라본 동해바다',   desc:'탁 트인 동해바다가 한눈에 내려다보이는 프라이빗 테라스 전망입니다.' },
  { id:3,  cat:'view',     featured:false, bg:'linear-gradient(135deg,#e8a030,#c47020)', icon:'🌅', imgData:null, category:'전망 · 자연', title:'동해 일출',                     desc:'이른 아침 테라스에서 맞이하는 동해 일출. 이 순간 하나만으로 충분한 이유가 됩니다.' },
  { id:4,  cat:'interior', featured:false, bg:'linear-gradient(135deg,#c4895a,#9a6030)', icon:'🛋️', imgData:null, category:'실내 공간', title:'화목난로가 있는 거실',          desc:'장작 타는 소리와 함께 따뜻한 저녁을 보낼 수 있는 아늑한 거실 공간입니다.' },
  { id:5,  cat:'interior', featured:true,  bg:'linear-gradient(135deg,#d4b896,#b09060)', icon:'🛏️', imgData:null, category:'실내 공간', title:'킹사이즈 침대가 있는 침실',     desc:'편안한 킹사이즈 침대와 자연 채광이 어우러진 침실. 숲 내음을 맡으며 깊은 잠에 빠져보세요.' },
  { id:6,  cat:'facility', featured:false, bg:'linear-gradient(135deg,#7a9e50,#507030)', icon:'🍳', imgData:null, category:'편의시설',   title:'풀옵션 주방',                   desc:'인덕션, 냉장고, 전자레인지 등 모든 조리도구가 구비된 풀옵션 주방입니다.' },
  { id:7,  cat:'facility', featured:false, bg:'linear-gradient(135deg,#8ab8d8,#5890b8)', icon:'🛁', imgData:null, category:'편의시설',   title:'욕조가 있는 메인 욕실',         desc:'여유로운 욕조에 몸을 담그며 하루의 피로를 씻어낼 수 있는 메인 욕실입니다.' },
  { id:8,  cat:'facility', featured:false, bg:'linear-gradient(135deg,#a8c8d8,#7098b0)', icon:'🚿', imgData:null, category:'편의시설',   title:'샤워 부스 욕실',                desc:'독립된 샤워 부스가 갖춰진 두 번째 욕실로 2인 동시 이용이 편리합니다.' },
  { id:9,  cat:'exterior', featured:false, bg:'linear-gradient(135deg,#6a9040,#487020)', icon:'🏕️', imgData:null, category:'외관 · 전경', title:'프라이빗 야외 테라스',         desc:'바다가 내려다보이는 넓은 야외 테라스. 아침 커피 한 잔의 완벽한 장소입니다.' },
  { id:10, cat:'view',     featured:false, bg:'linear-gradient(135deg,#1a2a4a,#0a1830)', icon:'🌃', imgData:null, category:'전망 · 자연', title:'별이 쏟아지는 밤하늘',          desc:'도심과 멀리 떨어진 덕분에 맑은 날 밤이면 쏟아지는 별빛을 감상할 수 있습니다.' },
  { id:11, cat:'exterior', featured:false, bg:'linear-gradient(135deg,#88b848,#587828)', icon:'🌸', imgData:null, category:'외관 · 전경', title:'계절 꽃이 피는 소정원',         desc:'봄이면 벚꽃, 여름이면 수국이 피어나는 작은 정원에서 계절의 변화를 즐겨보세요.' },
  { id:12, cat:'interior', featured:false, bg:'linear-gradient(135deg,#c85020,#902010)', icon:'🔥', imgData:null, category:'실내 공간', title:'화목난로 클로즈업',              desc:'장작 타는 소리와 은은한 온기, 겨울 시즌 영덕감성산장에서만 느낄 수 있는 특별함입니다.' },
];

let allCards = [];
let filtered = [];
let currentIdx = 0;
let currentFilter = 'all';

function init() {
  const saved = localStorage.getItem(PV_KEY);
  allCards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({...c}));

  // URL 파라미터로 시작 인덱스 지정 가능 (?idx=3)
  const params = new URLSearchParams(location.search);
  const startIdx = parseInt(params.get('idx') || '0');
  const startFilter = params.get('cat') || 'all';

  setFilter(startFilter, document.querySelector(`.filter-tab[onclick*="'${startFilter}'"]`) || document.querySelector('.filter-tab'));
  currentIdx = Math.min(startIdx, filtered.length - 1);
  render();
}

function setFilter(cat, btn) {
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  currentFilter = cat;
  filtered = (cat === 'all' ? allCards : allCards.filter(c => c.cat === cat))
    .slice().sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  currentIdx = 0;
  renderThumbs();
  render();
}

function render() {
  if (!filtered.length) return;
  const d = filtered[currentIdx];

  // 메인 사진
  const content = document.getElementById('slideContent');
  if (d.imgData) {
    content.innerHTML = `<img class="slide-img" src="${d.imgData}" alt="${d.title}">`;
  } else {
    content.innerHTML = `<div class="slide-placeholder" style="background:${d.bg};width:100%;height:100%;">${d.icon}</div>`;
  }

  // 정보
  document.getElementById('infoCategory').textContent = d.category;
  document.getElementById('infoTitle').textContent    = d.title;
  document.getElementById('infoDesc').textContent     = d.desc;
  document.getElementById('slideCounter').textContent = `${currentIdx + 1} / ${filtered.length}`;

  // 썸네일 활성화
  document.querySelectorAll('.thumb').forEach((t, i) => {
    t.classList.toggle('active', i === currentIdx);
    if (i === currentIdx) t.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
  });
}

function renderThumbs() {
  document.getElementById('thumbStrip').innerHTML = filtered.map((d, i) => {
    const inner = d.imgData
      ? `<img src="${d.imgData}" alt="">`
      : `<div class="thumb-bg" style="background:${d.bg}">${d.icon}</div>`;
    return `<div class="thumb${i === currentIdx ? ' active' : ''}" onclick="goTo(${i})">${inner}</div>`;
  }).join('');
}

function goTo(idx) {
  currentIdx = idx;
  render();
}

function move(dir) {
  if (!filtered.length) return;
  currentIdx = (currentIdx + dir + filtered.length) % filtered.length;
  render();
}

// 키보드 네비게이션
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  move(-1);
  if (e.key === 'ArrowRight') move(1);
  if (e.key === 'Escape')     location.href = 'pic_view.html';
});

// 스와이프 지원
let touchStartX = 0;
document.getElementById('slideMain' ) && document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive:true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) move(dx < 0 ? 1 : -1);
});

init();

// ── 이미지 업로드 ──
const HOST_KEY = 'pension_host';
const HOST_PWD = '1dl34';
const CAT_LABELS = { exterior:'외관 · 전경', interior:'실내 공간', view:'전망 · 자연', facility:'편의시설' };
let _pendingAuth = null;

function hostCheckThenUpload() {
  if (localStorage.getItem(HOST_KEY) === '1') { openUploadModal(); return; }
  const ao = document.getElementById('slideAuthOverlay');
  ao.style.display = 'flex';
  document.getElementById('slideAuthErr').textContent = '';
  document.getElementById('slideAuthField').value = '';
  setTimeout(() => document.getElementById('slideAuthField').focus(), 80);
  _pendingAuth = openUploadModal;
}
function closeSlideAuth() { document.getElementById('slideAuthOverlay').style.display = 'none'; }
function confirmSlideAuth() {
  if (document.getElementById('slideAuthField').value === HOST_PWD) {
    localStorage.setItem(HOST_KEY, '1');
    closeSlideAuth();
    if (_pendingAuth) { _pendingAuth(); _pendingAuth = null; }
  } else {
    document.getElementById('slideAuthErr').textContent = '인증 암호가 올바르지 않습니다.';
    document.getElementById('slideAuthField').value = '';
    document.getElementById('slideAuthField').focus();
  }
}
function openUploadModal() {
  document.getElementById('slideUploadTitle').value = '';
  document.getElementById('slideUploadCat').value = 'exterior';
  document.getElementById('slideUploadDesc').value = '';
  document.getElementById('slideUploadPreview').style.display = 'none';
  document.getElementById('slideUploadPlaceholder').style.display = 'flex';
  document.getElementById('slideUploadOverlay').style.display = 'flex';
  _uploadImgData = null;
}
function closeUploadModal() { document.getElementById('slideUploadOverlay').style.display = 'none'; }

let _uploadImgData = null;
function compressUpload(file, cb) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const MAX = 1200;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) { if (w > h) { h = Math.round(h*MAX/w); w=MAX; } else { w=Math.round(w*MAX/h); h=MAX; } }
      const canvas = document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      cb(canvas.toDataURL('image/jpeg',0.72));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
function onUploadFile(e) {
  const file = e.target.files[0]; if (!file) return;
  compressUpload(file, src => {
    _uploadImgData = src;
    const prev = document.getElementById('slideUploadPreview');
    prev.src = src; prev.style.display = 'block';
    document.getElementById('slideUploadPlaceholder').style.display = 'none';
  });
  e.target.value = '';
}
function saveUpload() {
  const title = document.getElementById('slideUploadTitle').value.trim();
  const cat   = document.getElementById('slideUploadCat').value;
  const desc  = document.getElementById('slideUploadDesc').value.trim();
  if (!_uploadImgData) { alert('사진을 선택하세요.'); return; }

  const saved = localStorage.getItem(PV_KEY);
  const cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c=>({...c}));
  const newId = cards.length ? Math.max(...cards.map(c=>c.id))+1 : 1;
  cards.push({ id:newId, cat, featured:false, bg:'linear-gradient(135deg,#7a9e50,#527830)', icon:'🖼️', imgData:_uploadImgData, category:CAT_LABELS[cat], title, desc, createdAt:Date.now() });
  try { localStorage.setItem(PV_KEY, JSON.stringify(cards)); } catch(e) { alert('저장 실패: 용량 부족'); return; }

  allCards = cards;
  setFilter(currentFilter, document.querySelector('.filter-tab.active'));
  closeUploadModal();
  showSlideToast('사진이 추가되었습니다!');
}
function showSlideToast(msg) {
  const t = document.getElementById('slideToast');
  t.textContent = msg; t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 2200);
}
</script>

<!-- 업로드 모달 -->
<div id="slideUploadOverlay" onclick="if(event.target===this)closeUploadModal()" style="display:none;position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px;">
  <div style="background:#fff;border-radius:18px;padding:28px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);">
    <div style="font-size:1.05rem;font-weight:900;margin-bottom:18px;color:#222;">📷 이미지 업로드</div>
    <div id="slideUploadPlaceholder" onclick="document.getElementById('slideFileInput').click()" style="height:120px;border:2px dashed #ddd;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.88rem;color:#aaa;cursor:pointer;margin-bottom:14px;">클릭하여 사진 선택</div>
    <img id="slideUploadPreview" style="display:none;width:100%;max-height:180px;object-fit:cover;border-radius:10px;margin-bottom:14px;" alt="">
    <input type="file" id="slideFileInput" accept="image/*" style="display:none" onchange="onUploadFile(event)">
    <select id="slideUploadCat" style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-family:inherit;font-size:.88rem;margin-bottom:10px;outline:none;">
      <option value="exterior">외관 · 전경</option>
      <option value="interior">실내 공간</option>
      <option value="view">전망 · 자연</option>
      <option value="facility">편의시설</option>
    </select>
    <input id="slideUploadTitle" type="text" placeholder="사진 제목 (선택 입력)" style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-family:inherit;font-size:.88rem;margin-bottom:10px;outline:none;">
    <textarea id="slideUploadDesc" placeholder="설명 (선택)" style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-family:inherit;font-size:.88rem;resize:vertical;min-height:60px;outline:none;margin-bottom:16px;"></textarea>
    <div style="display:flex;gap:8px;">
      <button onclick="closeUploadModal()" style="flex:1;padding:12px;border-radius:8px;background:#f0f0f0;color:#555;border:none;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;">취소</button>
      <button onclick="saveUpload()" style="flex:1;padding:12px;border-radius:8px;background:#6b3a1f;color:#fff;border:none;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;">저장</button>
    </div>
  </div>
</div>

<!-- 호스트 인증 모달 -->
<div id="slideAuthOverlay" onclick="if(event.target===this)closeSlideAuth()" style="display:none;position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:18px;padding:32px 28px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3);">
    <div style="font-size:1.05rem;font-weight:900;margin-bottom:6px;">🔐 호스트 인증</div>
    <div style="font-size:.82rem;color:#888;margin-bottom:18px;">호스트 암호를 입력하세요.</div>
    <input id="slideAuthField" type="password" placeholder="암호 입력" onkeydown="if(event.key==='Enter')confirmSlideAuth()" style="width:100%;padding:11px 14px;border:1.5px solid #ddd;border-radius:9px;font-family:inherit;font-size:.9rem;outline:none;margin-bottom:6px;">
    <div id="slideAuthErr" style="font-size:.75rem;color:#e05252;height:16px;margin-bottom:10px;"></div>
    <div style="display:flex;gap:8px;">
      <button onclick="closeSlideAuth()" style="flex:1;padding:11px;border-radius:8px;background:#f0f0f0;color:#555;border:none;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;">취소</button>
      <button onclick="confirmSlideAuth()" style="flex:1;padding:11px;border-radius:8px;background:#6b3a1f;color:#fff;border:none;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;">확인</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div id="slideToast" style="position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 22px;border-radius:20px;font-size:.84rem;font-weight:600;z-index:900;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;"></div>

</body>
</html>
